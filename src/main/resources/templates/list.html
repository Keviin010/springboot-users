<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container my-5">

    <div class="alert alert-danger alert-dismissible fade show"
         th:if="${error != null}" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="alert alert-success alert-dismissible fade show"
         th:if="${success != null}" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0" th:text="${title}">Listado de Usuarios</h3>
        <a th:href="@{/app/form}" class="btn btn-success">+ Crear Usuario</a>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(users)}">
        No hay usuarios registrados en el sistema.
    </div>

    <div class="table-responsive" th:if="${not #lists.isEmpty(users)}">
        <table class="table table-hover table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Email</th>
                <th>Fecha Creación</th>
                <th class="text-center">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.lastname}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${#temporals.format(user.createAt, 'dd/MM/yyyy HH:mm')}"></td>
                <td class="text-center">
                    <a class="btn btn-sm btn-primary"
                       th:href="@{/app/form/{id}(id=${user.id})}">
                        Editar
                    </a>
                    <a class="btn btn-sm btn-danger"
                       th:href="@{/app/delete/{id}(id=${user.id})}"
                       onclick="return confirm('¿Estás seguro de que deseas eliminar este usuario?');">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
