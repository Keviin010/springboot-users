<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Título</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container my-5">

    <h3 th:text="${title}">Título</h3>
    <p class="text-muted" th:text="${message}">Mensaje</p>

    <hr>

    <h5>Usuario de ejemplo</h5>
    <ul class="list-group w-25">
        <li class="list-group-item"><strong>Nombre:</strong> <span th:text="${user.name}"></span></li>
        <li class="list-group-item"><strong>Apellido:</strong> <span th:text="${user.lastname}"></span></li>
    </ul>

    <a th:href="@{/app/list}" class="btn btn-primary mt-4">Ver listado de usuarios</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
